<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portfólio</title>

    <!-- caminho correto -->
    <link rel="stylesheet" href="../Style/style.css">
</head>
<body>

    <h1>Meu Portfólio de Desenvolvedor</h1>

    <section>
        <h2 id="meuNome"></h2>
        <p id="minhaBio"></p>
        <p id="curso"></p>
        <p id="instituicao"></p>
    </section>

    <hr>

    <!-- IMPORTANTE: id igual ao CSS -->
    <section id="quiz-container">
        <h3>Descubra seu Perfil Tech</h3>
        <button id="btn-visual">🎨 Front-End</button>
        <button id="btn-logica">⚙️ Back-End</button>
        <div id="resultado-quiz"></div>
    </section>

    <hr>

    <section>
        <p id="tempoRestante"></p>
        <p id="statusNota"></p>
        <p id="diaAtual"></p>
    </section>

    <hr>

    <section>
        <h3>Habilidades</h3>
        <ul id="lista-habilidades"></ul>
    </section>

    <hr>

    <!-- PROJETOS -->
    <section>
        <h3>Meus Projetos</h3>
        <div id="lista-projetos"></div>
    </section>

    <br>

    <button id="modo">Modo Escuro</button>

    <script src="../Script/script.js"></script>
</body>
</html>
